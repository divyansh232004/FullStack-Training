<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-lg p-6 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-gray-800">To-Do List</h2>

    <div class="flex mb-4">
      <input type="text" id="taskInput" placeholder="Add a new task"
        class="border border-gray-300 rounded-l p-2 flex-grow focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button id="addTaskButton"
        class="bg-blue-500 hover:bg-blue-600 text-white rounded-r px-4 py-2 transition">Add</button>
    </div>

    <ul id="list" class="space-y-2">
      <li class="cursor-pointer bg-gray-50 p-2 rounded hover:bg-gray-100">Task 1</li>
      <li class="cursor-pointer bg-gray-50 p-2 rounded hover:bg-gray-100">Task 2</li>
      <li class="cursor-pointer bg-gray-50 p-2 rounded hover:bg-gray-100">Task 3</li>
    </ul>
  </div>

  <script>
    const list = document.querySelector("#list");
    const taskInput = document.querySelector("#taskInput");
    const addTaskButton = document.querySelector("#addTaskButton");

    list.addEventListener("click", function (e) {
      if (e.target.tagName === "LI") {
        e.target.classList.toggle("line-through");
        e.target.classList.toggle("text-gray-400");
      }
    });

    function addTask() {
      const taskText = taskInput.value.trim();
      if (taskText) {
        const listItem = document.createElement("li");
        listItem.textContent = taskText;
        listItem.className = "cursor-pointer bg-gray-50 p-2 rounded hover:bg-gray-100";
        list.appendChild(listItem);
        taskInput.value = "";
      }
    }

    addTaskButton.addEventListener("click", addTask);

    taskInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        addTask();
      }
    });
  </script>
</body>

</html>
