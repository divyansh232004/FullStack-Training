</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">

```
<!-- Login Card -->
<div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96">

    <h2 class="text-3xl text-white font-bold text-center mb-6">User Login</h2>

    <form action="#" method="post" class="space-y-4">

        <!-- Username -->
        <div>
            <label class="block text-gray-300 mb-1">User Name</label>
            <input type="text" name="username" placeholder="Enter your username"
                   class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <!-- Email -->
        <div>
            <label class="block text-gray-300 mb-1">Email</label>
            <input type="email" name="email" placeholder="Enter your email"
                   class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <!-- Password -->
        <div>
            <label class="block text-gray-300 mb-1">Password</label>
            <input type="password" name="password" placeholder="Enter your password"
                   class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <!-- Forgot Password -->
        <div class="text-right">
            <a href="#" class="text-blue-400 hover:underline text-sm">
                Forgot Password?
            </a>
        </div>

        <!-- Login Button -->
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold transition duration-300">
            Login
        </button>

    </form>

</div>
</body>
</html>
